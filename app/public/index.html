<html>
<head>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #121212;

```
    .container {
        background: #1e1e1e;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,0,0,0.6);
        width: 350px;
        text-align: center;
    }

    h1 {
        color: #00adb5;
        margin-bottom: 20px;
        font-size: 22px;
    }

    input, select {
        width: 90%;
        padding: 12px;
        margin: 8px 0;
        background: #2a2a2a;
        border: 1px solid #444;
        border-radius: 8px;
        color: white;

    button {
        width: 95%;
        padding: 12px;
        margin-top: 10px;
        background: linear-gradient(135deg, #00adb5, #007bff);

        transform: scale(1.03);
        opacity: 0.9;
    }

    #result {
        margin-top: 15px;

    }

        margin-top: 25px;
        font-size: 16px;
        color: #ccc;
    }

    ul {
        list-style: none;
        padding: 0;
        max-height: 150px;
        overflow-y: auto;
    }

    li {
        background: #2a2a2a;
        margin: 5px 0;
        padding: 8px;
        border-radius: 6px;
        font-size: 13px;
        border-left: 3px solid #00adb5;
    }

    /* Scrollbar styling */
    ul::-webkit-scrollbar {

    }

    ul::-webkit-scrollbar-thumb {

</style>
```

</head>
<body>

<div class="container">

```
<h1>SmartCalc🤖 Created by Chaitanyaaaa</h1>

<input type="number" id="num1" placeholder="Enter first number">
<input type="number" id="num2" placeholder="Enter second number">

<select id="operation">
    <option value="add">➕ Add</option>
    <option value="sub">➖ Subtract</option>
    <option value="mul">✖ Multiply</option>
    <option value="div">➗ Divide</option>
</select>

<button onclick="calculate()">Calculate</button>

<div id="result"></div>

<h3>History</h3>
<ul id="history"></ul>
```

</div>

<script>
    async function calculate() {
        const num1 = parseFloat(document.getElementById("num1").value);
        const num2 = parseFloat(document.getElementById("num2").value);
        const operation = document.getElementById("operation").value;

        if (isNaN(num1) || isNaN(num2)) {
            document.getElementById("result").innerText = "⚠️ Please enter valid numbers";
            return;
        }

        const res = await fetch('/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ num1, num2, operation })
        });

        const data = await res.json();

        document.getElementById("result").innerText = "Result: " + data.result;

        loadHistory();
    }

    async function loadHistory() {
        const res = await fetch('/history');
        const data = await res.json();

        const historyList = document.getElementById("history");
        historyList.innerHTML = "";

        data.forEach(item => {
            const li = document.createElement("li");
            li.innerText = `${item.num1} ${item.operation} ${item.num2} = ${item.result}`;
            historyList.appendChild(li);
        });
    }

    loadHistory();
</script>

</body>
</html>
